# kubernetes/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-industrial-agent
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: genai-agent
  template:
    metadata:
      labels:
        app: genai-agent
    spec:
      containers:
      - name: agent-container
        image: genai-industrial-agent:v1.0.0
        ports:
        - containerPort: 5000
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-secrets
              key: api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: genai-service
spec:
  selector:
    app: genai-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer